<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bergische LK-Turniere | Tennis Turniere im Bergischen Land</title>
  <meta name="description" content="LK-Turniere im Bergischen Land. Offizielle Turniere auf Sandplatz in Wuppertal und Haan. Jetzt anmelden auf mybigpoint.tennis.de">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Bergische LK-Turniere">
  <meta property="og:description" content="Offizielle DTB-Turniere auf Sandplatz im Bergischen Land. ESV Wuppertal West & TC Gruiten.">
  <meta property="og:image" content="https://bergische-lk.de/logo.svg">
  <meta property="og:url" content="https://bergische-lk.de">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-deep: #1C3A0E;
      --green-court: #2D5A18;
      --orange-clay: #B85A20;
      --cream: #F0EBE0;
      --white: #FFFFFF;
    }

    body {
      font-family: 'Barlow', sans-serif;
      color: var(--green-deep);
      background: var(--cream);
      line-height: 1.6;
    }

    /* --- NAV --- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--green-deep);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.8rem 2rem;
    }
    nav .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; color: var(--cream);
      letter-spacing: 2px; text-decoration: none;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .nav-logo-img { height: 32px; width: auto; }
    nav .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    nav a.nav-link {
      color: var(--cream); text-decoration: none; font-weight: 500;
      font-size: 0.95rem; transition: color 0.2s;
    }
    nav a.nav-link:hover { color: var(--orange-clay); }
    .lang-switch {
      display: flex; gap: 0.3rem;
      background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px;
    }
    .lang-switch button {
      background: none; border: none; color: var(--cream);
      font-family: 'Barlow', sans-serif; font-weight: 600;
      padding: 4px 10px; border-radius: 3px; cursor: pointer;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .lang-switch button.active {
      background: var(--orange-clay); color: var(--white);
    }

    /* --- HERO --- */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0; background-position: center; background-size: cover;
    }
    .hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(28,58,14,0.85) 0%, rgba(45,90,24,0.75) 100%);
    }
    .hero-content {
      position: relative; z-index: 2; padding: 2rem; max-width: 800px;
    }
    .hero-logo { width: 320px; max-width: 80vw; height: auto; margin: 0 auto 1.5rem; }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      color: var(--white); letter-spacing: 3px;
      line-height: 1.1; margin-bottom: 0.5rem;
    }
    .hero h1 span { color: var(--orange-clay); }
    .hero .subtitle {
      font-size: 1.3rem; color: rgba(240,235,224,0.9);
      margin-bottom: 0.5rem; font-weight: 500;
    }
    .hero .dates {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; color: var(--orange-clay);
      letter-spacing: 2px; margin-bottom: 2rem;
    }
    .btn {
      display: inline-block; padding: 1rem 2.5rem;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
      letter-spacing: 2px; border: none; border-radius: 4px;
      cursor: pointer; text-decoration: none; transition: all 0.3s;
    }
    .btn-primary { background: var(--orange-clay); color: var(--white); }
    .btn-primary:hover {
      background: #D4692A; transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(184,90,32,0.4);
    }
    .btn-outline { background: transparent; color: var(--cream); border: 2px solid var(--cream); }
    .btn-outline:hover { background: var(--cream); color: var(--green-deep); }
    .btn-sm { font-size: 1rem; padding: 0.7rem 1.5rem; }

    /* --- SECTIONS --- */
    section { padding: 5rem 2rem; }
    .container { max-width: 1100px; margin: 0 auto; }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem; letter-spacing: 2px;
      text-align: center; margin-bottom: 1rem;
    }
    .section-title span { color: var(--orange-clay); }
    .section-subtitle {
      text-align: center; color: #555;
      max-width: 600px; margin: 0 auto 3rem;
    }
    .divider {
      width: 60px; height: 4px; background: var(--orange-clay);
      margin: 1rem auto 2rem; border-radius: 2px;
    }

    /* --- TOURNAMENTS --- */
    .turniere { background: var(--cream); }
    .tournament-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
    .tournament-card {
      background: var(--white); border-radius: 12px; padding: 1.5rem;
      border-left: 4px solid var(--orange-clay);
      box-shadow: 0 2px 12px rgba(28,58,14,0.08);
      transition: transform 0.3s;
    }
    .tournament-card:hover { transform: translateY(-3px); }
    .tournament-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 0.3rem;
    }
    .tournament-card .t-meta { color: #555; font-size: 0.9rem; margin-bottom: 0.8rem; }
    .tournament-card .t-cats { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .t-cat {
      background: var(--green-court); color: var(--white);
      padding: 2px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .t-status {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600; margin-left: auto;
    }
    .t-status.upcoming { background: #E8E4DB; color: #777; }
    .t-status.registration { background: var(--orange-clay); color: var(--white); }
    .t-status.ongoing { background: var(--green-court); color: var(--white); }
    .t-status.completed { background: #ccc; color: #666; }

    /* --- ANLAGEN --- */
    .anlagen { background: var(--white); }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
    .card {
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(28,58,14,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      background: var(--white);
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(28,58,14,0.15);
    }
    .card-img { height: 220px; background-size: cover; background-position: center; }
    .card-body { padding: 1.5rem; }
    .card-body h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 1px; margin-bottom: 0.5rem;
    }
    .card-body .meta {
      display: flex; flex-direction: column; gap: 0.4rem;
      color: #555; font-size: 0.95rem; margin-bottom: 1rem;
    }
    .card-body .meta svg {
      width: 16px; height: 16px; vertical-align: middle;
      margin-right: 6px; fill: var(--orange-clay);
    }
    .tag {
      display: inline-block; background: var(--green-deep); color: var(--cream);
      padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    }

    /* --- REGLEMENT --- */
    .reglement { background: var(--green-deep); color: var(--cream); }
    .reglement .section-title { color: var(--cream); }
    .rules-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem;
    }
    .rule-item {
      background: rgba(255,255,255,0.08); border-radius: 10px;
      padding: 1.5rem; border-left: 4px solid var(--orange-clay);
    }
    .rule-item h4 {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
      letter-spacing: 1px; margin-bottom: 0.5rem; color: var(--orange-clay);
    }
    .rule-item p { font-size: 0.95rem; color: rgba(240,235,224,0.85); }

    /* --- KATEGORIEN --- */
    .kategorien { background: var(--cream); }
    .kat-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; }
    .kat-badge {
      background: var(--green-court); color: var(--white);
      padding: 0.8rem 2rem; border-radius: 50px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 2px;
    }

    /* --- SPONSORING --- */
    .sponsoring { background: var(--white); }
    .packages { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
    .package {
      border-radius: 12px; padding: 2rem; text-align: center;
      border: 2px solid #e0dcd4; transition: all 0.3s;
    }
    .package:hover { border-color: var(--orange-clay); transform: translateY(-4px); }
    .package.featured {
      border-color: var(--orange-clay);
      background: linear-gradient(135deg, #FFF8F0, #FFF);
    }
    .package-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 0.5rem;
    }
    .package-badge.bronze { color: #A0522D; }
    .package-badge.silver { color: #808080; }
    .package-badge.gold { color: var(--orange-clay); }
    .package ul {
      list-style: none; margin: 1.5rem 0;
      text-align: left; font-size: 0.95rem;
    }
    .package ul li { padding: 0.4rem 0; padding-left: 1.5rem; position: relative; }
    .package ul li::before {
      content: '\2713'; position: absolute; left: 0;
      color: var(--green-court); font-weight: 700;
    }

    /* --- SOCIAL --- */
    .social-section { background: var(--cream); text-align: center; }
    .social-links { display: flex; justify-content: center; gap: 1.5rem; margin-top: 2rem; }
    .social-btn {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.8rem 1.8rem; border-radius: 50px;
      text-decoration: none; font-weight: 600; transition: all 0.3s;
    }
    .social-btn svg { width: 24px; height: 24px; }
    .social-btn.insta {
      background: linear-gradient(135deg, #833AB4, #FD1D1D, #F77737);
      color: var(--white);
    }
    .social-btn.insta:hover { transform: scale(1.05); }
    .social-btn.whatsapp { background: #25D366; color: var(--white); }
    .social-btn.whatsapp:hover { transform: scale(1.05); }

    /* --- FAQ --- */
    .faq-section { background: var(--white); }
    .faq-item {
      border-bottom: 1px solid #e0dcd4;
      padding: 1.2rem 0; cursor: pointer;
    }
    .faq-item:last-child { border-bottom: none; }
    .faq-q {
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 600; font-size: 1.05rem;
    }
    .faq-q::after {
      content: '+'; font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; color: var(--orange-clay);
      transition: transform 0.3s;
    }
    .faq-item.open .faq-q::after { content: '−'; }
    .faq-a {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s;
      color: #555; font-size: 0.95rem;
    }
    .faq-item.open .faq-a {
      max-height: 200px; padding-top: 0.8rem;
    }

    /* --- NEWSLETTER --- */
    .newsletter { background: var(--green-deep); color: var(--cream); }
    .newsletter .section-title { color: var(--cream); }
    .newsletter-form {
      display: flex; gap: 0.8rem;
      max-width: 480px; margin: 0 auto;
      justify-content: center;
    }
    .newsletter-form input[type="email"] {
      flex: 1; padding: 0.8rem 1rem;
      border: 2px solid rgba(240,235,224,0.3);
      border-radius: 4px; background: rgba(255,255,255,0.1);
      color: var(--cream); font-family: 'Barlow', sans-serif;
      font-size: 1rem;
    }
    .newsletter-form input[type="email"]::placeholder { color: rgba(240,235,224,0.5); }
    .newsletter-form input[type="email"]:focus {
      outline: none; border-color: var(--orange-clay);
    }

    /* --- CONTACT --- */
    .contact { background: var(--green-deep); color: var(--cream); text-align: center; }
    .contact .section-title { color: var(--cream); }
    .contact a { color: var(--orange-clay); text-decoration: none; }
    .contact a:hover { text-decoration: underline; }

    /* --- FOOTER --- */
    footer {
      background: #111; color: #999; text-align: center;
      padding: 2rem; font-size: 0.85rem;
    }
    footer a { color: var(--orange-clay); text-decoration: none; }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      nav { padding: 0.6rem 1rem; }
      nav .nav-right { gap: 0.8rem; }
      nav a.nav-link { font-size: 0.85rem; }
      section { padding: 3rem 1.2rem; }
      .hero h1 { font-size: 2.5rem; }
    }
  </style>
</head>

<script src="data.js"></script>
<script>
/* ── Language engine ──────────────────────────────────── */
let LANG = localStorage.getItem('lang') || 'de';

function t(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[LANG] || obj.de || '';
}

function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-switch button').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === lang.toUpperCase())
  );
  localStorage.setItem('lang', lang);
  render();
}

/* ── SVG icons (reusable) ─────────────────────────────── */
const ICONS = {
  pin: '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>',
  court: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>',

/* ── Status labels ────────────────────────────────────── */
const STATUS = {
  upcoming:     { de: 'Demnächst', en: 'Upcoming' },
  registration: { de: 'Anmeldung offen', en: 'Registration open' },
  ongoing:      { de: 'Laufend', en: 'Ongoing' },
  completed:    { de: 'Abgeschlossen', en: 'Completed' },
};

/* ── Render everything ────────────────────────────────── */
function render() {
  const D = SITE;

  // data-de / data-en elements
  document.querySelectorAll('[data-de]').forEach(el => {
    el.innerHTML = el.dataset[LANG] || el.dataset.de;
  });

  // Nav logo
  document.getElementById('nav-logo').textContent = D.name.toUpperCase();

  // Hero
  document.getElementById('hero-bg').style.backgroundImage = `url('${D.hero.image}')`;
  document.getElementById('hero-title').innerHTML = t(D.hero.title);
  document.getElementById('hero-subtitle').textContent = t(D.hero.subtitle);
  document.getElementById('hero-dates').textContent = `${t(D.season.label)} — ${t(D.season.status)}`;
  const cta = document.getElementById('hero-cta');
  cta.href = D.hero.cta.url;
  cta.textContent = t(D.hero.cta.label);

  // Tournaments
  const tList = document.getElementById('tournament-list');
  tList.innerHTML = D.tournaments.map(tr => {
    const venue = D.venues.find(v => v.id === tr.venue);
    const link = tr.mybigpoint
      ? `<a href="${tr.mybigpoint}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" style="margin-top:0.8rem">${t(D.hero.cta.label)}</a>`
      : '';
    return `<div class="tournament-card">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <h3>${tr.name}</h3>
        <span class="t-status ${tr.status}">${t(STATUS[tr.status])}</span>
      </div>
      <div class="t-meta">${venue ? venue.name : ''} · ${t(tr.dates)}</div>
      <div class="t-cats">${tr.categories.map(c => `<span class="t-cat">${c}</span>`).join('')}</div>
      ${link}
    </div>`;
  }).join('');

  // Venues
  const vCards = document.getElementById('venue-cards');
  vCards.innerHTML = D.venues.map(v => `
    <div class="card">
      <div class="card-img" style="background-image:url('${v.image}')"></div>
      <div class="card-body">
        <h3>${v.name}</h3>
        <div class="meta">
          <span>${ICONS.pin} <a href="${v.maps}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${v.address}</a></span>
          <span>${ICONS.court} ${v.courts} ${t(v.surface)}</span>
        </div>
        <span class="tag">SANDPLATZ</span>
      </div>
    </div>
  `).join('');

  // Rules
  const rGrid = document.getElementById('rules-grid');
  rGrid.innerHTML = D.rules.map(r => `
    <div class="rule-item">
      <h4>${t(r.title)}</h4>
      <p>${t(r.text)}</p>
    </div>
  `).join('');

  // Categories
  const kList = document.getElementById('kat-list');
  kList.innerHTML = D.categories.map(c => `<div class="kat-badge">${c}</div>`).join('');

  // Sponsoring
  const pkgs = document.getElementById('packages');
  pkgs.innerHTML = D.sponsoring.map(s => `
    <div class="package${s.featured ? ' featured' : ''}">
      <div class="package-badge ${s.tier}">${s.label}</div>
      <ul>${s.perks.map(p => `<li>${t(p)}</li>`).join('')}</ul>
      <a href="mailto:${D.email}?subject=Sponsoring%20${s.label}" class="btn btn-primary btn-sm">KONTAKT</a>
    </div>
  `).join('');

  // Social
  const sLinks = document.getElementById('social-links');
  sLinks.innerHTML = `
    <a href="${D.social.instagram}" target="_blank" rel="noopener" class="social-btn insta">${ICONS.instagram} Instagram</a>
    <a href="${D.social.whatsapp}" target="_blank" rel="noopener" class="social-btn whatsapp">${ICONS.whatsapp} WhatsApp</a>
  `;

  // FAQ
  const faqList = document.getElementById('faq-list');
  faqList.innerHTML = D.faq.map(f => `
    <div class="faq-item" onclick="this.classList.toggle('open')">
      <div class="faq-q">${t(f.q)}</div>
      <div class="faq-a">${t(f.a)}</div>
    </div>
  `).join('');

  // Newsletter
  const nl = D.newsletter;
  const nlSection = document.getElementById('newsletter-section');
  if (nl && nl.enabled) {
    nlSection.style.display = '';
    document.getElementById('newsletter-text').textContent = t(nl.text);
    document.getElementById('newsletter-email').placeholder = t(nl.placeholder);
    document.getElementById('newsletter-btn').textContent = t(nl.cta);
    document.getElementById('nl-consent-label').innerHTML = LANG === 'de'
      ? 'Ich stimme zu, E-Mails über Turniere zu erhalten. Widerruf jederzeit möglich. <a href="legal.html" style="color:var(--orange-clay);">Datenschutzerklärung</a>'
      : 'I agree to receive tournament emails. Unsubscribe anytime. <a href="legal.html" style="color:var(--orange-clay);">Privacy Policy</a>';
    const nlForm = document.getElementById('newsletter-form');
    if (nl.action) {
      nlForm.action = nl.action;
    } else {
      nlForm.action = 'mailto:' + D.email;
      nlForm.method = 'GET';
    }
    // Require consent before newsletter submit
    nlForm.onsubmit = function(e) {
      if (!document.getElementById('nl-consent').checked) {
        e.preventDefault();
        alert(LANG === 'de' ? 'Bitte stimmen Sie der Datenschutzerklärung zu.' : 'Please accept the Privacy Policy.');
        return false;
      }
    };
  } else {
    nlSection.style.display = 'none';
  }

  // Contact
  const orgLabel = LANG === 'de' ? 'Organisator' : 'Organizer';
  document.getElementById('contact-info').textContent = `${D.organizerShort} — ${orgLabel}`;
  const emailEl = document.getElementById('contact-email');
  emailEl.href = `mailto:${D.email}`;
  emailEl.textContent = D.email;

  // Footer
  const rights = LANG === 'de' ? 'Alle Rechte vorbehalten.' : 'All rights reserved.';
  document.getElementById('footer-copy').innerHTML = `&copy; ${D.year} ${D.name}. ${rights}`;
}

// Cookie banner
function showCookieBanner() {
  if (localStorage.getItem('cookie_ok')) return;
  const b = document.getElementById('cookie-banner');
  b.style.display = 'flex';
  document.getElementById('cookie-text').textContent = LANG === 'de'
    ? 'Diese Website verwendet keine Tracking-Cookies. Wir speichern lediglich Ihre Sprachpräferenz.'
    : 'This website does not use tracking cookies. We only store your language preference.';
  document.getElementById('cookie-btn').textContent = LANG === 'de' ? 'Verstanden' : 'Got it';
}
function dismissCookie() {
  localStorage.setItem('cookie_ok', '1');
  document.getElementById('cookie-banner').style.display = 'none';
}

// Init
setLang(LANG);
showCookieBanner();
</script>

</body>
</html>
