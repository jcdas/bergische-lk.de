<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnierplakat — Bergische LK-Turniere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  /* ── CHARTE GRAPHIQUE bergische-lk.de ── */
  :root {
    --green-deep:  #1C3A0E;
    --green-court: #2D5A18;
    --orange-clay: #B85A20;
    --cream:       #F0EBE0;
    --white:       #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Barlow", sans-serif;
    background: #888;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2em;
  }

  /* ── POSTER (A3 portrait: 297x420mm) ── */
  .poster {
    width: 297mm;
    height: 420mm;
    background: var(--cream);
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
  }

  /* ── HERO IMAGE ── */
  .hero-image {
    height: 90mm;
    background: url("https://images.unsplash.com/photo-1622279457486-62dcc4a431d6?w=1200&q=80") center center / cover no-repeat;
    position: relative;
    flex-shrink: 0;
  }
  .hero-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(28,58,14,0.2) 0%, rgba(28,58,14,0.9) 100%);
  }

  /* ── HEADER BAND ── */
  .header-band {
    background: var(--green-deep);
    padding: 10mm 20mm 12mm;
    text-align: center;
    position: relative;
    margin-top: -30mm;
    z-index: 2;
    flex-shrink: 0;
  }
  .header-band::after {
    content: "";
    position: absolute;
    bottom: -15mm;
    left: 0; right: 0;
    height: 15mm;
    background: var(--orange-clay);
    clip-path: polygon(0 0, 100% 0, 100% 40%, 0 100%);
  }
  .logo-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12mm;
    margin-bottom: 8mm;
  }
  .logo-row img {
    height: 18mm;
    filter: brightness(0) invert(1);
  }
  .site-name {
    font-family: "Bebas Neue", sans-serif;
    font-size: 14pt;
    color: var(--cream);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .tournament-name {
    font-family: "Bebas Neue", sans-serif;
    font-size: 42pt;
    color: var(--white);
    line-height: 1.05;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .venue-name {
    font-family: "Bebas Neue", sans-serif;
    font-size: 22pt;
    color: var(--orange-clay);
    margin-top: 3mm;
    letter-spacing: 1px;
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    padding: 18mm 20mm 8mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8mm;
  }

  /* DATE */
  .date-block {
    background: var(--green-deep);
    color: var(--white);
    padding: 6mm 16mm;
    border-radius: 4mm;
    text-align: center;
  }
  .date-block .day {
    font-family: "Bebas Neue", sans-serif;
    font-size: 48pt;
    line-height: 1;
  }
  .date-block .month-year {
    font-family: "Bebas Neue", sans-serif;
    font-size: 22pt;
    color: var(--cream);
    letter-spacing: 2px;
  }
  .date-block .weekday {
    font-size: 11pt;
    font-weight: 600;
    color: var(--orange-clay);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* INFO GRID */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6mm;
    width: 100%;
    max-width: 240mm;
  }
  .info-card {
    background: var(--white);
    border-left: 3mm solid var(--orange-clay);
    padding: 5mm 6mm;
    border-radius: 2mm;
  }
  .info-card.full { grid-column: 1 / -1; }
  .info-card .label {
    font-size: 8pt;
    font-weight: 700;
    color: var(--orange-clay);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1mm;
  }
  .info-card .value {
    font-size: 13pt;
    font-weight: 600;
    color: var(--green-deep);
  }

  /* QR SECTION */
  .qr-section {
    display: flex;
    align-items: center;
    gap: 10mm;
    background: var(--white);
    padding: 8mm 12mm;
    border-radius: 4mm;
    border: 1mm solid var(--green-court);
    max-width: 240mm;
    width: 100%;
  }
  .qr-code {
    flex-shrink: 0;
  }
  .qr-code canvas { display: block; }
  .qr-text {
    flex: 1;
  }
  .qr-text .cta {
    font-family: "Bebas Neue", sans-serif;
    font-size: 24pt;
    color: var(--green-deep);
    line-height: 1.1;
  }
  .qr-text .sub {
    font-size: 10pt;
    color: #555;
    margin-top: 2mm;
  }
  .qr-text .url {
    font-size: 9pt;
    color: var(--orange-clay);
    font-weight: 600;
    margin-top: 2mm;
    word-break: break-all;
  }

  /* FOOTER */
  .footer-band {
    background: var(--green-deep);
    padding: 8mm 20mm;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--cream);
    font-size: 9pt;
  }
  .footer-band .org {
    font-weight: 700;
    font-size: 10pt;
  }
  .footer-band a {
    color: var(--orange-clay);
    text-decoration: none;
    font-weight: 600;
  }

  /* ── CONTROLS (no-print) ── */
  .controls {
    margin-top: 2em;
    display: flex;
    gap: 1em;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls select, .controls button {
    font-family: "Barlow", sans-serif;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 6px;
    border: 2px solid var(--green-deep);
    cursor: pointer;
  }
  .controls button {
    background: var(--green-deep);
    color: white;
    font-weight: 700;
  }
  .controls button:hover { background: var(--green-court); }

  /* ── PRINT ── */
  @media print {
    body { background: none; padding: 0; }
    .poster { box-shadow: none; margin: 0; }
    .controls { display: none; }
    @page {
      size: A3 portrait;
      margin: 0;
    }
  }
</style>
</head>
<body>

<!-- ── CONTROLS ── -->
<div class="controls" id="controls">
  <label>
    <strong>Turnier:</strong>
    <select id="tournamentSelect"></select>
  </label>
  <button onclick="window.print()">Drucken / PDF speichern</button>
</div>

<!-- ── POSTER ── -->
<div class="poster" id="poster">
  <!-- Hero: Unsplash free license — clay court close-up -->
  <div class="hero-image"></div>

  <div class="header-band">
    <div class="logo-row">
      <span class="site-name">BERGISCHE LK-TURNIERE</span>
    </div>
    <div class="tournament-name" id="pName"></div>
    <div class="venue-name" id="pVenue"></div>
  </div>

  <div class="content">
    <div class="date-block">
      <div class="weekday" id="pWeekday"></div>
      <div class="day" id="pDay"></div>
      <div class="month-year" id="pMonthYear"></div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="label">Kategorien</div>
        <div class="value" id="pCategories"></div>
      </div>
      <div class="info-card">
        <div class="label">Format</div>
        <div class="value">Spiralturnier LK</div>
      </div>
      <div class="info-card">
        <div class="label">Meldeschluss</div>
        <div class="value" id="pDeadline"></div>
      </div>
      <div class="info-card">
        <div class="label">Nenngeld</div>
        <div class="value" id="pFee"></div>
      </div>
      <div class="info-card full">
        <div class="label">Adresse</div>
        <div class="value" id="pAddress"></div>
      </div>
    </div>

    <div class="qr-section">
      <div class="qr-code" id="qrContainer"></div>
      <div class="qr-text">
        <div class="cta">JETZT ANMELDEN!</div>
        <div class="sub">QR-Code scannen oder auf tennis.de anmelden</div>
        <div class="url" id="pUrl"></div>
      </div>
    </div>
  </div>

  <div class="footer-band">
    <div>
      <span class="org">Bergische LK-Turniere</span> | Veranstalter: Jean-Charles Das
    </div>
    <div>
      <a href="mailto:info@bergische-lk.de">info@bergische-lk.de</a> |
      <a href="https://bergische-lk.de">bergische-lk.de</a>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  // ── DATE HELPERS ──
  const WEEKDAYS_DE = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
  const MONTHS_DE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

  function parseDateDE(str) {
    // Accepts "02. Mai 2026 (Samstag)" or "02. Mai 2026"
    const m = str.match(/(\d{1,2})\.\s*(\w+)\s+(\d{4})/);
    if (!m) return null;
    const day = parseInt(m[1]);
    const monthIdx = MONTHS_DE.findIndex(mo => mo.toLowerCase() === m[2].toLowerCase());
    const year = parseInt(m[3]);
    if (monthIdx === -1) return null;
    return new Date(year, monthIdx, day);
  }

  // ── POPULATE TOURNAMENT SELECTOR ──
  const sel = document.getElementById("tournamentSelect");
  SITE.tournaments.forEach((t, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = t.name + (t.dates.de !== "Termin folgt" ? " — " + t.dates.de : " (TBA)");
    sel.appendChild(opt);
  });

  // ── Check URL param ──
  const urlParams = new URLSearchParams(window.location.search);
  const paramId = urlParams.get("tournament");
  if (paramId) {
    const idx = SITE.tournaments.findIndex(t => t.id === paramId);
    if (idx >= 0) sel.value = idx;
  }

  sel.addEventListener("change", render);

  function render() {
    const t = SITE.tournaments[sel.value];
    const venue = SITE.venues.find(v => v.id === t.venue);

    // Header
    document.getElementById("pName").textContent = t.name;
    document.getElementById("pVenue").textContent = venue ? venue.name : "";

    // Date
    const d = parseDateDE(t.dates.de);
    if (d) {
      document.getElementById("pWeekday").textContent = WEEKDAYS_DE[d.getDay()];
      document.getElementById("pDay").textContent = String(d.getDate()).padStart(2, "0");
      document.getElementById("pMonthYear").textContent = MONTHS_DE[d.getMonth()] + " " + d.getFullYear();
    } else {
      document.getElementById("pWeekday").textContent = "";
      document.getElementById("pDay").textContent = "??";
      document.getElementById("pMonthYear").textContent = t.dates.de;
    }

    // Info cards
    const catMap = { "U12": "U12", "U14": "U14", "U16": "U16", "H00": "Herren" };
    // Group youth categories under "Jugend"
    const cats = t.categories.map(c => catMap[c] || c);
    const youth = cats.filter(c => c.startsWith("U"));
    const adults = cats.filter(c => !c.startsWith("U"));
    const display = [];
    if (youth.length > 0) display.push("Jugend: " + youth.join(", "));
    if (adults.length > 0) display.push(adults.join(", "));
    document.getElementById("pCategories").textContent = display.join(" | ");
    document.getElementById("pDeadline").textContent = t.meldeschluss ? t.meldeschluss.de : "Wird bekannt gegeben";
    document.getElementById("pFee").textContent = t.nenngeld ? t.nenngeld.de : "Wird bekannt gegeben";
    document.getElementById("pAddress").textContent = venue ? venue.name + ", " + venue.address : "";

    // URL
    const regUrl = t.mybigpoint || "https://bergische-lk.de";
    document.getElementById("pUrl").textContent = regUrl;

    // QR Code
    const container = document.getElementById("qrContainer");
    container.innerHTML = "";
    if (regUrl) {
      const qr = qrcode(0, "M");
      qr.addData(regUrl);
      qr.make();
      const size = 6; // cell size in px
      const img = qr.createImgTag(size, 0);
      container.innerHTML = img;
      // Style the generated image
      const imgEl = container.querySelector("img");
      if (imgEl) {
        imgEl.style.width = "35mm";
        imgEl.style.height = "35mm";
      }
    }
  }

  // Initial render
  render();
</script>
</body>
</html>
